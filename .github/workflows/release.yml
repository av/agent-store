name: Release

on:
  push:
    tags: ["v*"]

# Default to read-only; each job grants only what it needs.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      # Cross toolchain for targets that differ from the host (linux musl).
      - uses: taiki-e/setup-cross-toolchain-action@v1
        if: matrix.target == 'x86_64-unknown-linux-musl'
        with:
          target: ${{ matrix.target }}
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: agent-store
          target: ${{ matrix.target }}
          archive: agent-store-$tag-$target
          include: LICENSE,THIRD-PARTY-LICENSES.md,README.md,completions,man
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
      # Signed build provenance for the release archive, verifiable with:
      #   gh attestation verify <asset> --repo av/agent-store
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            agent-store-*-${{ matrix.target }}.tar.gz
            agent-store-*-${{ matrix.target }}.zip

  # Publish to crates.io. Skips gracefully when CARGO_REGISTRY_TOKEN is not
  # configured (the crate name is currently unresolved on crates.io), so
  # tagging a release never fails on this job.
  publish-crate:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Check for registry token
        id: token
        run: |
          if [ -n "$CARGO_REGISTRY_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "CARGO_REGISTRY_TOKEN not set; skipping crates.io publish." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: cargo publish
        if: steps.token.outputs.present == 'true'
        run: cargo publish --locked

  # Bump the Homebrew formula in av/homebrew-tap with the new version and
  # sha256 checksums of the release artifacts. Skips gracefully when
  # HOMEBREW_TAP_TOKEN is not configured.
  bump-homebrew-formula:
    name: Bump Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    # Writes go to av/homebrew-tap via HOMEBREW_TAP_TOKEN, not GITHUB_TOKEN.
    permissions:
      contents: read
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Check for tap token
        id: token
        run: |
          if [ -n "$HOMEBREW_TAP_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP_TOKEN not set; skipping Homebrew tap bump." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Checkout tap
        if: steps.token.outputs.present == 'true'
        uses: actions/checkout@v4
        with:
          repository: av/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Update formula and push
        if: steps.token.outputs.present == 'true'
        run: |
          ./scripts/update-formula.sh "${GITHUB_REF_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-store.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date." >> "$GITHUB_STEP_SUMMARY"
          else
            git commit -m "agent-store ${GITHUB_REF_NAME#v}"
            git push
          fi
