name: docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mkdocs-material
        run: pip install mkdocs-material

      # README.md and docs/*.md are the single source of truth. Stage them
      # into .docs-build/ preserving the repo layout so every relative link
      # (README <-> docs/*.md, ../SECURITY.md, assets/) works unchanged.
      - name: Stage docs
        run: |
          rm -rf .docs-build
          mkdir .docs-build
          cp README.md AGENTS.md SECURITY.md CONTRIBUTING.md CHANGELOG.md LICENSE THIRD-PARTY-LICENSES.md .docs-build/
          cp -r docs assets examples completions man .docs-build/

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
