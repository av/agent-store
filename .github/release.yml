# Configuration for GitHub's auto-generated release notes
# (the "Generate release notes" button / `gh release create --generate-notes`).
# Used to build the "What's Changed" section referenced by RELEASE_TEMPLATE.md.
changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Bug fixes
      labels:
        - bug
    - title: New features and improvements
      labels:
        - enhancement
    - title: Documentation
      labels:
        - documentation
    - title: Dependencies
      labels:
        - dependencies
    - title: Other changes
      labels:
        - "*"
